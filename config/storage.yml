local:
  service: Disk
  root: <%= Rails.root.join('storage') %>

test:
  service: Disk
  root: <%= Rails.root.join('tmp/storage') %>

minio:
  service: S3
  endpoint: <%= Rails.application.credentials.dig(Rails.env.to_sym, :minio, :endpoint) %>
  force_path_style: true
  access_key_id: <%= Rails.application.credentials.dig(Rails.env.to_sym, :minio, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(Rails.env.to_sym, :minio, :secret_access_key) %>
  bucket: <%= Rails.application.credentials.dig(Rails.env.to_sym, :minio, :bucket) %>
  region: <%= Rails.application.credentials.dig(Rails.env.to_sym, :minio, :region) %>

# Supabase Storage over its S3-compatible endpoint
# (https://<ref>.storage.supabase.co/storage/v1/s3, S3 access keys from
# Project Settings -> Storage). Keys bypass RLS: server-side only.
supabase:
  service: S3
  endpoint: <%= Rails.application.credentials.dig(Rails.env.to_sym, :supabase, :storage, :endpoint) %>
  force_path_style: true
  access_key_id: <%= Rails.application.credentials.dig(Rails.env.to_sym, :supabase, :storage, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(Rails.env.to_sym, :supabase, :storage, :secret_access_key) %>
  bucket: <%= Rails.application.credentials.dig(Rails.env.to_sym, :supabase, :storage, :bucket) %>
  region: <%= Rails.application.credentials.dig(Rails.env.to_sym, :supabase, :storage, :region) %>

rustfs:
  service: S3
  endpoint: <%= Rails.application.credentials.dig(Rails.env.to_sym, :rustfs, :endpoint) %>
  force_path_style: true
  access_key_id: <%= Rails.application.credentials.dig(Rails.env.to_sym, :rustfs, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(Rails.env.to_sym, :rustfs, :secret_access_key) %>
  bucket: <%= Rails.application.credentials.dig(Rails.env.to_sym, :rustfs, :bucket) %>
  region: <%= Rails.application.credentials.dig(Rails.env.to_sym, :rustfs, :region) %>
