ru:
  changelogs:
    '4031':
      cosmere:
        title1: Лёгкое создание персонажа
        title2: Снаряжение и доступные атаки
        title3: Кость истории
        title4: Повышение уровней
        desc1: Для создания нового персонажа вам нужно всего лишь выбрать наследие, культуру и героический путь
        desc2: Вы можете выбрать любое снаряжение для своего персонажа, в разделе боя отобразятся все доступные атаки
        desc3: Помимо простых бросков D20 и других костей, вы можете делать броски костей истории
        desc4: Вы можете изменять уровень своих персонажей, выбирать компетенции и таланты
    '4026':
      pf:
        title1: Архетипы
        title2: Верные звери
        title3: Учет сопротивлений
        title4: Статическая прогрессия классов
        desc1: Добавлена возможность выбирать архетипы
        desc2: Добавлена возможность управлять верными зверьми
        desc3: Добавлены автоматические и ручные подсчеты сопротивлений
        desc4: Добавлена автоматические подсчеты доступных способностей классов в зависимости от уровня
    '4023':
      pf:
        title1: Черты любимцев
        title2: Учет опыта
        title3: Второстепенные скорости
        title4: Очки героизма
        title5: Здоровье
        desc1: Добавлена возможность управлять чертами любимцев/фамильяров с автоматическим применением бонусов
        desc2: Добавлена возможность учитывать опыт персонажа
        desc3: Добавлено отображение вторичных скоростей с возможностью добавлять к ним бонусы
        desc4: Добавлена возможность учитывать очки героизма
        desc5: Добавлен автоматический расчет максимального здоровья
    '4021':
      dnd:
        title1: Homebrews
        desc1: Возможность добавлять homebrew происхождений и черт
      pf:
        title1: Управление заклинаниями
        title2: Статические черты для рас, классов
        title3: Эффекты отдыха
        title4: Система бонусов
        title5: Любимцы и фамильяры
        title6: Улучшение характеристик
        desc1: Добавлена возможность изучать/подготавливать обычные и спонтанные заклинания, управлять врождёнными и фокальными заклинаниями (автоматически и вручную)
        desc2: Добавлена автоматическая прогрессия черт для рас и классов в зависимости от уровня
        desc3: Добавлена возможность начать отдых с автоматическим применением эффектов отдыха
        desc4: Добавлена возможность добавлять статические или динамические бонусы к характеристикам персонажа
        desc5: Добавлена базовая возможность создавать любимцев/фамильяров
        desc6: Улучшено управление основными характеристиками
    '4019':
      cosmere:
        title1: Базовая интеграция
        desc1: можно добавлять персонажей, совместимых с правилами Cosmere RPG
    '4018':
      dh:
        title1: Таблицы добычи
        title2: Аватары для компаньонов
        title3: Кости сплочения
        desc1: персонажи могут получать случайные предметы, как указано в основной книге правил
        desc2: вы можете загрузить аватар для компаньона персонажа
        desc3: вы можете указать текущие кости сплочения для ваших персонажей, предоставленные бардом группы
      dnd:
        title1: Homebrew заклинания
        desc1: вы можете создавать/копировать/управлять/делиться заклинаниями, созданными самостоятельно, для любого из ваших персонажей
    '4016':
      dnd:
        title1: Homebrew подклассы
        title2: Система бонусов
        title3: Спасброски
        desc1: вы можете создавать/копировать/управлять/делиться подклассами для любого из ваших персонажей
        desc2: система бонусов была полностью изменена для лучшей настройки персонажей
        desc3: изменено отображение спасбросков
      pf:
        title1: Левелинг
        title2: Навыки знаний
        desc1: персонажи могут менять свой уровень и выбирать различные черты
        desc2: вы можете вручную управлять навыками знаний для своих персонажей
    '4015':
      dc20:
        title1: Поддержка 0.10
        desc1: полная переработка управления персонажами согласно правилам 0.10
    '4014':
      fallout:
        title1: Базовая интеграция
        desc1: можно добавлять персонажей, совместимых с правилами Fallout 2d20
