        title: Интерактивные листы персонажей для любых ролевых систем в одном месте
        dashboard_link: Персонажи
        homebrews_link: Homebrews
        description3: С 23.01.2026 Чаркипер работает на 2 отдельных серверах как 2 независимых приложения, вы можете переключаться между серверами, но добавляя/обновляя/удаляя любые данные - они будут изменены только на текущем сервере. Мобильное приложение тоже можно переключить на использование более подходящего сервера.
        switch_ru: Переключиться на RU
        switch_eu: Переключиться на EU
        ttrpgs: Поддержка различных настольных игр
        ttrpgs_desc: "В данный момент CharKeeper поддерживает D&D версии 2014 и 2024. Вы можете сохранять данные о своих персонажах без ограничений."
        ttrpgs_desc3: Это неофициальный фанатский контент, созданный и распространяемый для некоммерческого использования.
        extension: Расширения для браузеров
        extension_desc: CharKeeper имеет возможности импорта персонажей с D&D Beyond через специальные расширения для браузеров. Просто установите расширение, посетите страницу с персонажем и скачайте файл персонажа через расширение.
        extension_for: Расширение для
        integrations: Интеграции
        integrations_desc: CharKeeper имеет возможности интеграции с Owlbear Rodeo для отображения результатов бросков кубиков внутри приложения и выполнения различных команд.
        cross: Кроссплатформенность
        cross_desc: CharKeeper доступен как веб-приложение, работает на мобильных устройствах под управлением iOS и Android, доступно приложение для MacOS.
        homebrews:
          title: Система управление homebrew
          feature_1: Создавайте и делитесь своими homebrew расами, классами, подклассами, предметами.
          feature_2: Объединяйте свои homebrew в книги для удобного распространения для ваших игроков.
        app_for: Приложение для
        open_source: Открытый исходный код
        os_desc: CharKeeper доступен как проект с открытым исходным кодом на GitHub. Вы можете оставлять отзывы или сообщать об ошибках, а также вносить свой вклад в разработку CharKeeper.
        os_link: Исходный код
