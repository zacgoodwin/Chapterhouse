        magic: Магический урон вызывается или усиливается магией.
        Two-Handed: Это оружие требует 2 руки для Атаки.
        primary_weapon: Основное оружие — это главное оружие, которым ваш персонаж, скорее всего, будет сражаться во время столкновения. Персонаж может держать только одно основное оружие за раз.
        secondary_weapon: Дополнительное оружие — это, как правило, вспомогательное снаряжение, которое дополняет боевой стиль вашего персонажа, такое как щиты, кинжалы или небольшие мечи. Если основное оружие персонажа одноручное, мы рекомендуем вам также взять дополнительное оружие (но вы не можете держать дополнительное оружие, если переключитесь на основное оружие, требующее двух рук).
