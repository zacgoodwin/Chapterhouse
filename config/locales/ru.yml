        extension_for: Расширение для
        integrations: Интеграции
        integrations_desc: CharKeeper имеет возможности интеграции с Owlbear Rodeo для отображения результатов бросков кубиков внутри приложения и выполнения различных команд.
        cross: Кроссплатформенность
        cross_desc: CharKeeper доступен как веб-приложение, работает на мобильных устройствах под управлением iOS и Android, доступно приложение для MacOS.
