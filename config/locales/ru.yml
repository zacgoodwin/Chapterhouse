        dashboard_link: Персонажи
        homebrews_link: Homebrews
        description3: С 23.01.2026 Чаркипер работает на 2 отдельных серверах как 2 независимых приложения, вы можете переключаться между серверами, но добавляя/обновляя/удаляя любые данные - они будут изменены только на текущем сервере. Мобильное приложение тоже можно переключить на использование более подходящего сервера.
