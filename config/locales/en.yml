      focus:
        Long-Ranged: Spells you cast with a Range greater than 1 have their range increase by 5 Spaces.
      weapon:
        Axe: "The target makes a Repeated Physical Save. Failure: The target begins Bleeding."
        Bow: "The target makes an Agility Save. Failure: The target is Slowed until the end of its next turn."
        Crossbow: You add a d4 to your Attack Check.
        Fist: "Fist Weapons are considered to be a free hand for the purposes of Grappling. Grapple: The target makes a Physical Save. Failure: The target becomes Grappled by you."
        Hammer: "The target makes a Might Save. Failure: The target is pushed 1 Space away. Each time you use this Enhancement, the target is pushed 1 additional Space."
        Pick: "The target makes an Agility Save. Failure: The target becomes Hindered until the end of their next turn."
        Sling: "The target makes an Agility Save. Failure: The target becomes Hindered until the end of their next turn."
        Spear: "The target makes an Agility Save. Failure: The target becomes Slowed until the end of their next turn."
        Staff: "The target makes a Physical Save. Failure: The target falls Prone."
        Sword: You add a d4 to your Attack Check.
        Whip: "The target makes a Might Save. Failure: The target is moved horizontally 1 Space toward you or to your left or right. Each time you use this Enhancement, the target is moved 1 additional Space."
        Ammo: You can load a weapon as part of an Attack made with it.
        Concealable: Drawing the weapon doesn't provoke Opportunity Attacks. If you draw the weapon as part of an Attack, you have ADV on the Attack. You can only gain this benefit once against each creature per Combat.
        Cumbersome: It takes 1 AP to draw, stow, or pick up this Weapon.
        Deft: Ranged Attacks with this Weapon don't have DisADV as a result of you being Prone.
        Guard: You gain +1 PD while wielding the weapon.
        Heavy: The Weapon's damage increases by 1.
        Impact: You deal +1 situational damage on Heavy Hits.
        Multi-Faceted: You must choose which weapon Style to use. The chosen weapon Style determines the Attack's damage type.
        Reach: This weapon adds 1 Space to your Melee Range when you Attack with it.
        Reload: You must spend 1 AP or 1 SP and use a free hand to reload the Weapon. If the Weapon stops being held, it must be loaded again.
        Silent: When you make a Ranged Attack with the weapon while Hidden, you remain Unheard by creatures you're Hidden from.
        Toss: You can throw the weapon to make a Ranged Martial Attack.
        Thrown: You can throw the weapon to make a Ranged Martial Attack.
        Two-Handed: The weapon requires 2 hands when you Attack with it.
        Unwieldy: You have DisADV on Attacks made with the weapon against targets within 1 Space of you.
        Versatile: This weapon can be wielded with 1 or 2 hands. When you wield the weapon with 2 hands, you gain a +2  situational bonus to Hit using it.
        Returning: When you Miss a Ranged Attack with the Weapon, it returns to your hand.
        Grasp: The Shield is considered to be a free hand when Grappling, Reloading a Weapon, or Attacking with Versatile Weapon.
        Mounted: The Shield's Bonus also applies to your Mount's Defense.
        b: Things that bludgeon you, like a hammer or fist.
        p: Things that pierce you, like an arrow or fangs.
        s: Things that slash you, like a blade or claw.
