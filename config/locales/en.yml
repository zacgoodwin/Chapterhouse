en:
  changelogs:
    '4031':
      cosmere:
        title1: Easy character creation
        title2: Equipment and available attacks
        title3: Plot die
        title4: Leveling
        desc1: For new Cosmere character you need just select ancestry, culture and heroic path
        desc2: You can select any equipment for your character, combat section will render all available attacks
        desc3: In addition to simple D20 rolls you can make plot die rolls
        desc4: You can change level of your characters, select expertises and talents
    '4026':
      pf:
        title1: Archetypes
        title2: Animal companions
        title3: Damage reduction
        title4: Static classes progression
        desc1: Added selecting archetypes
        desc2: Added editing animal companions
        desc3: Added auto and manual counting of damage reduction
        desc4: Added auto attach static class feats by levels
    '4023':
      pf:
        title1: Pet Feats
        title2: Experience Calculation
        title3: Secondary Speeds
        title4: Hero Points
        title5: Health
        desc1: Added the ability to manage pet/familiar feats with automatic bonuses
        desc2: Added the ability to take character experience into account
        desc3: Added the display of secondary speeds with the ability to add bonuses to them
        desc4: Added the ability to take Hero Points into account
        desc5: Added automatic calculation of maximum health
    '4021':
      dnd:
        title1: Homebrews
        desc1: Added homebrew feats and subclasses
      pf:
        title1: Spells management
        title2: Static feats
        title3: Rest options
        title4: Bonuses
        title5: Pets
        title6: Ability boosts
        desc1: Added the ability to learn/prepare simple and spontaneous spells, and manage innate and focal spells (automatically and manually)
        desc2: Added automatic feats progression for ancestries and classes based on level
        desc3: Added the ability to start a rest with automatic application of rest effects
        desc4: Added the ability to add static or dynamic bonuses to character stats
        desc5: Added the basic ability to create pets/familiars
        desc6: Improved management of primary stats
    '4019':
      cosmere:
        title1: Core integration
        desc1: Cosmere RPG compatible characters support was added
    '4018':
      dh:
        title1: Loot tables
        title2: Companion avatars
        title3: Rally dice
        desc1: characters can get random items like specified in core roolbook
        desc2: you can upload avatar for character's companion
        desc3: you can specify current Rally Dice for your characters provided by party bard
      dnd:
        title1: Homebrew spells
        desc1: you can create/copy/manage/share homebrew spells for any of your characters
    '4016':
      dnd:
        title1: Homebrew subclasses
        title2: Bonuses system
        title3: Saving throws
        desc1: you can create/copy/manage/share subclasses for any of your characters
        desc2: bonuses system was totally modified for better character customization
        desc3: rendering of saving throws was modified
      pf:
        title1: Leveling management
        title2: Lore skills
        desc1: characters can change their level and select general/skill/ancestry/class feats or any additional feats
        desc2: you can manually manage lore skills for your characters
    '4015':
      dc20:
        title1: 0.10 support
        desc1: total rebuilding DC20 characters management for better support 0.10 rules
    '4014':
      fallout:
        title1: Core integration
        desc1: Fallout 2d20 compatible characters support was added
