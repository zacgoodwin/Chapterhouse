      index_v2:
        title: Hojas de personaje interactivas para cualquier juego de mesa en un solo lugar.
        dashboard_link: Personajes
        homebrews_link: Homebrews
        description3: Desde el 23 de enero de 2026, Charkeeper se ejecuta en dos servidores separados como dos aplicaciones independientes. Se puede cambiar de servidor, pero añadir, actualizar o eliminar datos solo afectará al servidor actual. La aplicación móvil también se puede cambiar para utilizar un servidor más adecuado.
        switch_ru: Cambiar a RU
        switch_eu: Cambiar a EU
        ttrpgs: Soporte para varios juegos de rol de mesa
        ttrpgs_desc: "CharKeeper es compatible actualmente con D&D 2014 y 2024. Puedes guardar los datos de tu personaje sin limitaciones."
        ttrpgs_desc3: This is unofficial fan content, created and shared for non-commercial use.
        extensión: Extensiones para navegador
        descripción de la extensión: CharKeeper permite importar personajes de D&D Beyond mediante extensiones específicas para navegador. Simplemente instala la extensión, visita la página del personaje y descarga el archivo del personaje a través de la extensión.
        extensión para: Extensión para
        integrations: Integraciones
        integrations_desc: CharKeeper tiene capacidades de integración con Owlbear Rodeo para mostrar los resultados de las tiradas de dados dentro de la aplicación y ejecutar varios comandos.
        cross: Multiplataforma
        cross_desc: CharKeeper está disponible como una aplicación web, funciona en dispositivos móviles iOS y Android y tiene una aplicación para MacOS.
