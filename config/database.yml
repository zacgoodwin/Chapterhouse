# frozen_string_literal: true

# Non-test environments connect to Supabase hosted Postgres through the
# Supavisor SESSION pooler (port 5432). Never point the app at the
# transaction pooler (port 6543): GoodJob needs LISTEN/NOTIFY and
# with_advisory_lock needs session-level advisory locks.
# Connection values live in encrypted credentials under
# <env>.supabase.db (host, port, database, username, password).
# Test stays on localhost: the suite truncates its database.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS') { 10 } %>

# Keyless Docker image builds (assets:precompile) evaluate this ERB with no
# master key, where reading credentials raises MissingKeyError; resolve to an
# empty hash there. No connection is made during precompile, so nil values are
# never dialed. The leading # keeps YAML linters happy; ERB still executes.
# <% supabase_db = begin; Rails.application.credentials.dig(Charkeeper.credentials_env, :supabase, :db) || {}; rescue ActiveSupport::EncryptedFile::MissingKeyError; {}; end %>
supabase: &supabase
  <<: *default
  host: <%= supabase_db[:host] %>
  port: <%= supabase_db[:port] || 5432 %>
  database: <%= supabase_db[:database] || 'postgres' %>
  username: <%= supabase_db[:username] %>
  password: <%= supabase_db[:password] %>
  sslmode: require

development:
  <<: *supabase

local_production:
  <<: *supabase

test:
  <<: *default
  host: localhost
  port: 5432
  username: postgres
  password: postgres
  database: charkeeper_test

production:
  <<: *supabase

